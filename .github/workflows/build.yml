name: Racik Kernel NetHunter untuk SM-T285 (gtexslte) - /e/OS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM 32-bit Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          sudo apt-get install -y gcc-arm-linux-androideabi g++-arm-linux-androideabi

      - name: Build
        uses: dabao1955/kernel_build_action@main
        env:
          CROSS_COMPILE: arm-linux-gnueabihf-
          ARCH: arm
          TARGET_KERNEL_CONFIG: gtexslte_defconfig
        with:
          kernel-url: 'https://github.com/jedld/kernel_samsung_gtexslte'
          kernel-branch: 'master'
          config: '/gtexslte_defconfig'
          arch: 'arm'
          aosp-gcc: true
          anykernel3: true
          nethunter: true
          nethunter-patch: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
