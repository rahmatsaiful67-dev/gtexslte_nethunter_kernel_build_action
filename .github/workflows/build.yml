name: Racik Kernel NetHunter untuk SM-T285 (gtexslte) - /e/OS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Proses Perakitan Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mulai Meracik Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          # 1. SUMBER KERNEL
          kernel-url: 'https://github.com/Vagr9K/kernel_samsung_gtexslte'
          kernel-branch: 'master'
          
          # 2. CETAK BIRU PERANGKAT
          config: 'gtexslte_defconfig'
          
          # 3. ARSITEKTUR PROSESOR (32-bit)
          arch: 'arm'
          
          # 4. PERALATAN PERAKITAN (Toolchain Kustom GCC 4.9)
          aosp-gcc: false
          other-gcc32-url: 'https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9'
          other-gcc32-branch: 'cm-14.1'
          other-gcc64-url: 'https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9'
          other-gcc64-branch: 'cm-14.1'
          
          # 5. FITUR KHUSUS
          anykernel3: true
          nethunter: true
          nethunter-patch: false
          
          # 6. PERINTAH EKSTRA - KENDALI PENUH
          extra-make-args: '["zImage", "CROSS_COMPILE=arm-linux-androideabi-", "ARCH=arm", "CFLAGS=-Wno-error", "-j1"]'
          
          # 7. PENYELESAIAN
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
