name: Racik Kernel NetHunter untuk SM-T285 (gtexslte) - /e/OS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM 32-bit Toolchain
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          
          # Install standar ARM toolchain yang tersedia di Ubuntu
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            gcc-arm-none-eabi \
            build-essential \
            libssl-dev \
            bc \
            bison \
            flex \
            git \
            wget

      - name: Download Android NDK (Alternative for androideabi)
        run: |
          cd /tmp
          wget https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          echo "export NDK_HOME=/tmp/android-ndk-r21e" >> $GITHUB_ENV

      - name: Build
        uses: dabao1955/kernel_build_action@main
        env:
          CROSS_COMPILE: arm-linux-gnueabihf-
          ARCH: arm
        with:
          kernel-url: 'https://github.com/jedld/kernel_samsung_gtexslte'
          kernel-branch: 'master'
          config: '/gtexslte_defconfig'
          arch: 'arm'
          aosp-gcc: true
          anykernel3: true
          nethunter: true
          nethunter-patch: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
