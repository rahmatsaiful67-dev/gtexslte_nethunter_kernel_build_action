name: SM-T285 Stable Kernel Build

on:
  workflow_dispatch:

env:
  TZ: Asia/Jakarta
  DEFCONFIG: gtexslte_defconfig
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v3

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev zip
          echo "BUILD_TIME=$(date +'%Y%m%d_%H%M')" >> $GITHUB_ENV

      - name: Fetch Toolchain
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-eabi-4.8 --depth=1 toolchain

      - name: Verify Defconfig
        run: |
          echo "Daftar defconfig yang tersedia:"
          ls arch/arm/configs/ | grep defconfig || echo "TIDAK ADA DEFCONFIG DITEMUKAN!"

      - name: Compile Kernel
        run: |
          export ARCH=arm
          export CROSS_COMPILE=$(pwd)/toolchain/bin/arm-eabi-
          export KBUILD_BUILD_USER="MasterClass-Builder"
          export KBUILD_BUILD_HOST="Excellent-Totalitas"
          
          make clean && make mrproper
          make $DEFCONFIG
          make -j$(nproc --all) zImage

      - name: Prepare AnyKernel3
        run: |
          git clone $ANYKERNEL_REPO AnyKernel3
          cp arch/arm/boot/zImage AnyKernel3/
          # Konfigurasi sederhana untuk gtexslte
          sed -i 's/device.name1=.*/device.name1=gtexslte/' AnyKernel3/anykernel.sh
          cd AnyKernel3 && zip -r9 ../Kernel-SM-T285-${{ env.BUILD_TIME }}.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Kernel-SM-T285-Final
          path: Kernel-SM-T285-*.zip
