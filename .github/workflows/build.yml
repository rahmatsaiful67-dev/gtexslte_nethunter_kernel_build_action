name: Racik Kernel NetHunter untuk SM-T285 (gtexslte) - /e/OS

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Proses Perakitan Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mulai Meracik Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          # 1. SUMBER KERNEL (PRIORITASKAN Vagr9K)
          kernel-url: 'https://github.com/Vagr9K/kernel_samsung_gtexslte'
          kernel-branch: 'master'
          
          # 2. CETAK BIRU PERANGKAT (File konfigurasi)
          config: 'gtexslte_defconfig'
          
          # 3. ARSITEKTUR PROSESOR (32-bit)
          arch: 'arm'
          
          # 4. PERALATAN PERAKITAN (Toolchain) - INI YANG BERUBAH
          aosp-gcc: true
          # android-version: '7.1' <-- BARIS INI DIHAPUS ATAU DIKOMENTARI
          
          # 5. FITUR KHUSUS (Patch NetHunter & Kemasan)
          anykernel3: true
          nethunter: true
          nethunter-patch: false
          
          # 6. PENYELESAIAN (Buat halaman unduh)
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
