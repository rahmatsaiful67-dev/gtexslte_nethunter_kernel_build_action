name: Racik Kernel NetHunter untuk SM-T285 (gtexslte) - /e/OS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: 'https://github.com/Vagr9K/kernel_samsung_gtexslte'
          kernel-branch: 'master'
          config: '/gtexslte_defconfig'
          arch: 'arm'                       # WAJIB 32-bit
          aosp-gcc: true
          android-version:            # Untuk toolchain yang tepat
          anykernel3: true
          nethunter: true                   # Aktifkan fitur NetHunter
          nethunter-patch: false            # Hindari konflik patch
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
