name: Racik Kernel NetHunter untuk SM-T285 (gtexslte) - /e/OS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Proses Perakitan Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mulai Meracik Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          # 1. SUMBER KERNEL (Gunakan jedld yang lebih murni)
          kernel-url: 'https://github.com/jedld/kernel_samsung_gtexslte'
          kernel-branch: 'master'
          
          # 2. CETAK BIRU PERANGKAT
          config: 'gtexslte_defconfig'
          
          # 3. ARSITEKTUR PROSESOR (32-bit)
          arch: 'arm'
          
          # 4. PERALATAN PERAKITAN (Toolchain Kustom GCC 4.8)
          aosp-gcc: false
          # Gunakan toolchain GCC 4.8 khusus ARM EABI
          other-gcc32-url: 'https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-eabi-4.8'
          other-gcc32-branch: 'master'
          
          # 5. FITUR KHUSUS (Patch NetHunter & Kemasan)
          anykernel3: true
          nethunter: true
          nethunter-patch: false
          
          # 6. PERINTAH EKSTRA (Target zImage)
          extra-make-args: '["zImage"]'
          
          # 7. PENYELESAIAN (Buat halaman unduh)
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
